# hugo server --minify --themesDir ../..

# for maximum cleanups and rebuilds, run where you checked out the repository
# hugo server --printPathWarnings --disableFastRender --cleanDestinationDir=true --logLevel=debug \
# --gc -M -s exampleSite --themesDir ../.. -b http://127.0.0.1/

baseURL = 'http://127.0.0.1:1313/'
title = 'Hugo Book'
theme = 'hugo-book'

copyright = '[© CC BY 4.0](https://creativecommons.org/licenses/by/4.0/legalcode)'

# Book configuration
disablePathToLower = true
enableGitInfo = false

# Needed for mermaid/katex shortcodes
[markup]
[markup.goldmark.renderer]
  unsafe = true

[markup.tableOfContents]
  startLevel = 1

[menu]
[[menu.home]]
  name = 'Documentation'
  pageRef = '/docs/'
  weight = 1

[params]
  # 开启自动生成的侧边栏菜单
  bookMenuBundle = false # 如果是 false，它会去读 content 目录结构
  bookSectionPagesMenu = true 
  
  # 侧边栏 UI 设置
  bookTheme = "auto"
  bookSearch = true
  bookToc = true
  bookCollapseSection = true